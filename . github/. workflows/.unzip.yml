name: Unzip Files

on: 
  push:
    branches:
      - main  # أو أي فرع آخر ترغب في تشغيل العملية عليه

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Unzip files
      run: unzip <portfolio>.zip -d <اسم المجلد>  # استبدل <github> باسم ملف zip الذي رفعته و<اسم المجلد> بالمجلد الذي تريده

    - name: Commit unzipped files
      run: |
        git config --global user.name 'your-username'
        git config --global user.email 'your-email@example.com'
        git add <اسم المجلد>
        git commit -m 'Unzipped files'
        git push
